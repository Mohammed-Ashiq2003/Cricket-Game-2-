<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cricket Blitz – Hit or Miss!</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== MAIN WRAPPER ===== -->
  <div id="app">

    <!-- STADIUM BACKGROUND LAYERS -->
    <div class="stadium-bg">
      <div class="stadium-layer layer-sky"></div>
      <div class="stadium-layer layer-stands"></div>
      <div class="stadium-layer layer-pitch"></div>
      <div class="floodlight fl-left"></div>
      <div class="floodlight fl-right"></div>
      <!-- Crowd dots (generated by JS) -->
      <div id="crowd-container"></div>
    </div>

    <!-- ===== SPLASH SCREEN ===== -->
    <section id="screen-splash" class="game-screen active">
      <div class="splash-card">
        <div class="logo-wrap">
          <span class="logo-ball">🏏</span>
          <h1 class="game-title">Cricket<br><span>Blitz</span></h1>
        </div>
        <p class="tagline">Hit it for Six or go Home!</p>

        <!-- Difficulty -->
        <div class="difficulty-select">
          <label class="diff-label">Select Difficulty</label>
          <div class="diff-buttons">
            <button class="diff-btn active" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
          </div>
        </div>

        <div class="hs-display">🏆 High Score: <span id="splash-hs">0</span></div>
        <button id="btn-start" class="cta-btn">START BATTING</button>
      </div>
    </section>

    <!-- ===== GAME SCREEN ===== -->
    <section id="screen-game" class="game-screen">

      <!-- Top HUD -->
      <div id="hud">
        <div class="hud-cell">
          <span class="hud-label">SCORE</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-cell hud-center">
          <span class="diff-badge" id="hud-diff">EASY</span>
          <div id="wickets-row">
            <span class="wicket" id="w1">🏏</span>
            <span class="wicket" id="w2">🏏</span>
            <span class="wicket" id="w3">🏏</span>
          </div>
        </div>
        <div class="hud-cell">
          <span class="hud-label">BEST</span>
          <span class="hud-value" id="hud-hs">0</span>
        </div>
      </div>

      <!-- Ball arena -->
      <div id="arena">
        <!-- Pitch crease lines -->
        <div class="crease crease-top"></div>
        <div class="crease crease-bottom"></div>
        <!-- Wicket stumps -->
        <div id="wicket-stumps">
          <div class="stump"></div><div class="stump"></div><div class="stump"></div>
          <div class="bail"></div><div class="bail bail-r"></div>
        </div>
        <!-- The cricket ball -->
        <div id="ball">
          <div class="ball-seam"></div>
        </div>
        <!-- Hit zone indicator -->
        <div id="hit-zone">TAP TO HIT!</div>
        <!-- Score popup -->
        <div id="score-popup"></div>
        <!-- Bat swing visual -->
        <div id="bat-visual">🏏</div>
      </div>

      <!-- Ball counter / over display -->
      <div id="over-display">
        <span id="balls-row"></span>
        <span class="over-text"> &nbsp;BALLS</span>
      </div>

      <!-- Tap button for mobile -->
      <div id="hit-btn-wrap">
        <button id="btn-hit" aria-label="Hit the ball">HIT!</button>
      </div>

      <!-- Speed indicator -->
      <div id="speed-bar-wrap">
        <span class="speed-lbl">SPEED</span>
        <div id="speed-track"><div id="speed-bar"></div></div>
        <span id="speed-val">1x</span>
      </div>

    </section>

    <!-- ===== GAME OVER SCREEN ===== -->
    <section id="screen-over" class="game-screen">
      <div class="over-card">
        <div id="over-icon">🏏</div>
        <h2 class="over-title" id="over-title">WICKET!</h2>
        <p class="over-sub" id="over-sub">Better luck next innings</p>
        <div class="score-display">
          <div class="score-box">
            <span class="sb-label">YOUR SCORE</span>
            <span class="sb-val" id="over-score">0</span>
          </div>
          <div class="score-box highlight">
            <span class="sb-label">HIGH SCORE</span>
            <span class="sb-val" id="over-hs">0</span>
          </div>
        </div>
        <div id="balls-faced-display">Balls faced: <span id="over-balls">0</span></div>
        <div class="over-actions">
          <button id="btn-restart" class="cta-btn">PLAY AGAIN</button>
          <button id="btn-menu" class="secondary-btn">MAIN MENU</button>
        </div>
      </div>
    </section>

  </div><!-- /#app -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
